<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✦ Visual Stim Board</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a14; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="devicePicker" style="
  position:fixed;inset:0;background:#0a0a14;
  display:flex;align-items:center;justify-content:center;
  z-index:9999;flex-direction:column;gap:24px;">
  <div style="text-align:center;margin-bottom:8px;">
    <div style="font-size:36px">✦</div>
    <h1 style="color:#c8e4ff;font-family:sans-serif;font-size:28px;margin:8px 0">Visual Stim Board</h1>
    <p style="color:#7ba2d4;font-family:sans-serif;font-size:15px">What are you using today?</p>
  </div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;">
    <button id="btnDesktop" style="
      background:rgba(28,36,92,0.9);border:2px solid rgba(80,130,220,0.6);
      border-radius:18px;padding:28px 36px;cursor:pointer;text-align:center;
      min-width:160px;transition:border-color 0.2s;">
      <div style="font-size:48px">💻</div>
      <div style="color:#e8f5ff;font-family:sans-serif;font-size:17px;font-weight:bold;margin-top:10px">Laptop / Computer</div>
      <div style="color:#7ba2d4;font-family:sans-serif;font-size:12px;margin-top:4px">Keyboard & mouse</div>
    </button>
    <button id="btnMobile" style="
      background:rgba(28,36,92,0.9);border:2px solid rgba(80,130,220,0.6);
      border-radius:18px;padding:28px 36px;cursor:pointer;text-align:center;
      min-width:160px;transition:border-color 0.2s;">
      <div style="font-size:48px">📱</div>
      <div style="color:#e8f5ff;font-family:sans-serif;font-size:17px;font-weight:bold;margin-top:10px">Phone / Tablet</div>
      <div style="color:#7ba2d4;font-family:sans-serif;font-size:12px;margin-top:4px">Touch screen</div>
    </button>
  </div>
</div>
<canvas id="c"></canvas>
<script type="module">
  
    import { initJoystick, drawJoystick, isJoystickActive } from './MobileUi-Joystick.js';
    import { initMobileUI, createMobileButtons, isTurtleOn } from './mobileUI.js';
    import { PALETTES, paletteNames } from './palettes.js';
    import { loadSound, playPlink, loadSparkleSound, playSparkle } from './sound.js';
    import { toggleBreathing, drawBreathing } from './breathing.js';
    import { spawnLetterBubble, updateLetterBubbles, drawLetterBubbles } from './letters.js';
    import { keyDown, keyUp, updateTurtle, drawTurtle, setTurtleColor } from './turtle.js';
    import { toggleSpinner, isSpinnerOn, handleScroll, drawSpinner, setSpinnerColors } from './spinner.js';
    import { spawnSparkle, updateSparkles, drawSparkles } from './sparkles.js';
    import { spawnRipple, updateRipples, drawRipples } from './ripples.js';
    import { drawStars, updateStars, setStarLevel } from './stars.js';

  // ── Device Picker ──────────────────────────────────────
  let deviceMode = null;
    let currentPalette = 0;
    let sparkleMode = false;
    function getSparkleMode() { return sparkleMode; }
    function setSparkleMode(v) { sparkleMode = v; }

    function randColor() {
      const cols = PALETTES[paletteNames[currentPalette]];
      const c = cols[Math.floor(Math.random() * cols.length)];
      const j = v => Math.max(60, Math.min(255, v + Math.floor(Math.random()*40-20)));
      return [j(c[0]), j(c[1]), j(c[2])];
    }

    loadSound('./sound1.mp3');
    loadSparkleSound('./sparkle.wav');
    
    initMobileUI({
      showToast,
      toggleBreathing,
      toggleSpinner,
      isSpinnerOn,
      setSparkleMode,
      getSparkleMode,
      showSensoryPicker,
      showColourPicker,
    });

    if (deviceMode === 'mobile') {
      createMobileButtons();
    }

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
  
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  
  
    // ── Mouse / Touch ──────────────────────────────────────
  let mouseDown = false;
  let lastSpawn = 0;

  function spawnAt(x, y) {
    if (y > canvas.height - 36) return;
    if (isTurtleOn() && isJoystickActive()) return;
    const now = performance.now();
    if (now - lastSpawn < rippleDelay) return;
    lastSpawn = now;
    if (sparkleMode) {
      const cap = deviceMode === 'mobile' ? Math.min(maxSparklesPerClick, 3) : maxSparklesPerClick;
      for (let i = 0; i < cap; i++) spawnSparkle(x, y, randColor);
      playSparkle();
    } else {
      spawnRipple(x, y, randColor);
      playPlink();
    }
  }

  canvas.addEventListener('mousedown', e => { mouseDown = true; spawnAt(e.clientX, e.clientY); });
  canvas.addEventListener('mouseup',   () => mouseDown = false);
  canvas.addEventListener('mousemove', e => { if (mouseDown) spawnAt(e.clientX, e.clientY); });
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    if (isTurtleOn() && t.clientX < window.innerWidth * 0.4 && t.clientY > window.innerHeight * 0.4) return;
    spawnAt(t.clientX, t.clientY);
  }, {passive: false});

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    if (isTurtleOn() && t.clientX < window.innerWidth * 0.4 && t.clientY > window.innerHeight * 0.4) return;
    spawnAt(t.clientX, t.clientY);
  }, {passive: false});

  document.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
      e.preventDefault();
      keyDown(e.key, canvas.width, canvas.height, (x, y) => {
        if (sparkleMode) {
          const burst = deviceMode === 'mobile' ? 8 : 20;
          for (let i = 0; i < burst; i++) spawnSparkle(x, y, randColor);
          playSparkle();
        } else {
          spawnRipple(x, y, randColor);
          playPlink();
        }
      });
    }
    if (e.key === '1') toggleBreathing(showToast);
    if (e.key === '2') { toggleSpinner(); showToast('🌀 Fidget spinner ' + (isSpinnerOn() ? 'on — scroll to spin!' : 'off')); }
    if (e.key === '4') { sparkleMode = !sparkleMode; showToast('✨ Sparkle mode ' + (sparkleMode ? 'on' : 'off')); }
    if (e.key === '5') showSensoryPicker();
    if (e.key === '6') showColourPicker();
    if (e.key.length === 1 && e.key.match(/[a-zA-Z]/)) {
      spawnLetterBubble(e.key.toUpperCase(), canvas.width, canvas.height, randColor);
      if (sparkleMode) playSparkle();
      else playPlink();
    }
  });

  document.addEventListener('keyup', e => { keyUp(e.key); });
  window.addEventListener('wheel', handleScroll);
  
    // ── Toast ──────────────────────────────────────────────
    function showToast(msg) {
      let t = document.getElementById('toast');
      if (!t) { t = document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
      t.textContent = msg;
      t.style.cssText = `position:fixed;top:18px;left:50%;transform:translateX(-50%);
        background:rgba(20,25,60,0.9);color:#d2ebff;padding:10px 20px;
        border-radius:14px;font-family:sans-serif;font-size:16px;
        pointer-events:none;transition:opacity 0.4s;z-index:999;`;
      t.style.opacity = '1';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.style.opacity = '0', 2000);
    }
  
    // ── Colour Picker ──────────────────────────────────────
    function showColourPicker() {
      if (document.getElementById('colourPicker')) return;
      const overlay = document.createElement('div');
      overlay.id = 'colourPicker';
      overlay.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.6);
        display:flex;align-items:center;justify-content:center;z-index:1000;`;
      const card = document.createElement('div');
      card.style.cssText = `background:rgba(18,22,56,0.97);border-radius:22px;padding:24px;
        border:2px solid rgba(80,130,220,0.4);max-width:520px;width:90%;`;
      card.innerHTML = `<h2 style="color:#c8e4ff;font-family:sans-serif;margin-bottom:16px;text-align:center">🎨 Choose your colours!</h2>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px" id="paletteGrid"></div>`;
      overlay.appendChild(card);
      document.body.appendChild(overlay);
  
      const grid = card.querySelector('#paletteGrid');
      paletteNames.forEach((name, i) => {
        const btn = document.createElement('button');
        const cols = PALETTES[name];
        const sel = i === currentPalette;
        btn.style.cssText = `background:${sel?'rgba(50,68,135,0.95)':'rgba(28,36,92,0.8)'};
          border:2px solid ${sel?'#a0d7ff':'rgba(58,80,162,0.7)'};border-radius:11px;
          padding:8px;cursor:pointer;display:flex;align-items:center;gap:6px;`;
        btn.innerHTML = `<span>${cols.slice(0,5).map(c=>`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:rgb(${c})"</span>`).join('')}</span>
          <span style="color:#e6f5ff;font-size:13px;font-family:sans-serif">${name}</span>`;
          btn.onclick = () => { 
            currentPalette = i;
            setTurtleColor(PALETTES[name]);
            setSpinnerColors(PALETTES[name]);
            document.body.removeChild(overlay); 
            showToast('Palette: ' + name); 
          };
        grid.appendChild(btn);
      });
  
      overlay.addEventListener('click', e => { if (e.target === overlay) document.body.removeChild(overlay); });
    }

    // ── Sensory Level Picker ───────────────────────────────
  const STIM_LEVELS = [
  { key: 'calm',   label: '😌 Calm & Gentle',   desc: 'Soft and slow — easy on the eyes and ears' },
  { key: 'medium', label: '😊 Just Right',       desc: 'A nice balance — not too much, not too little' },
  { key: 'high',   label: '🎉 Full of Energy!',  desc: 'Bright and buzzy — lots of colour and movement!' },
];
let stimLevel = 'medium';

function applyStimLevel() {
  if (stimLevel === 'calm') {
    rippleDelay = 110; maxSparklesPerClick = 2;
  } else if (stimLevel === 'medium') {
    rippleDelay = 70; maxSparklesPerClick = 8;
  } else {
    rippleDelay = 40; maxSparklesPerClick = 16;
  }
  setStarLevel(stimLevel);
}

let rippleDelay = 70;
let maxSparklesPerClick = 8;

function showSensoryPicker() {
  if (document.getElementById('sensoryPicker')) return;
  const overlay = document.createElement('div');
  overlay.id = 'sensoryPicker';
  overlay.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.6);
    display:flex;align-items:center;justify-content:center;z-index:1000;`;
  const card = document.createElement('div');
  card.style.cssText = `background:rgba(18,22,56,0.97);border-radius:22px;padding:28px;
    border:2px solid rgba(80,130,220,0.4);max-width:420px;width:90%;`;
  card.innerHTML = `
    <h2 style="color:#c8e4ff;font-family:sans-serif;margin-bottom:8px;text-align:center">🌟 How are you feeling today?</h2>
    <p style="color:#7ba2d4;font-family:sans-serif;font-size:13px;text-align:center;margin-bottom:18px">Choose what feels right for you right now</p>
    <div id="sensoryGrid" style="display:flex;flex-direction:column;gap:10px"></div>`;
  overlay.appendChild(card);
  document.body.appendChild(overlay);

  const grid = card.querySelector('#sensoryGrid');
  STIM_LEVELS.forEach(level => {
    const btn = document.createElement('button');
    const sel = stimLevel === level.key;
    btn.style.cssText = `background:${sel?'rgba(50,72,145,0.95)':'rgba(28,36,92,0.8)'};
      border:2px solid ${sel?'#a0d7ff':'rgba(58,80,162,0.7)'};border-radius:14px;
      padding:14px 16px;cursor:pointer;text-align:left;width:100%;`;
    btn.innerHTML = `
      <div style="color:#e8f5ff;font-family:sans-serif;font-size:16px;font-weight:bold">${level.label} ${sel?'✓':''}</div>
      <div style="color:#7ba2d4;font-family:sans-serif;font-size:13px;margin-top:4px">${level.desc}</div>`;
    btn.onclick = () => {
      stimLevel = level.key;
      applyStimLevel();
      document.body.removeChild(overlay);
      showToast('Sensory level: ' + level.label);
    };
    grid.appendChild(btn);
  });

  overlay.addEventListener('click', e => { if (e.target === overlay) document.body.removeChild(overlay); });
}

  
  // ── Hint Bar ───────────────────────────────────────────
  function drawHintBar() {
    const bh = 36;
    const y = canvas.height - bh;
    ctx.fillStyle = 'rgba(8,10,30,0.8)';
    ctx.fillRect(0, y, canvas.width, bh);
    ctx.fillStyle = 'rgba(125,162,212,0.9)';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('🖱 Click → ripples/sparkles     1 Breathe     2 Fidget     4 Sparkles     5 Sensory     6 Colours', 10, y + 14);
    ctx.fillText('Fidget: scroll to spin fast!', 10, y + 28);
  }
  
  window.addEventListener('wheel', handleScroll);

  // ── Device Picker ──────────────────────────────────────
  function dismissPicker(mode) {
    deviceMode = mode;
    document.getElementById('devicePicker').style.display = 'none';
    if (mode === 'mobile') {
      rippleDelay = 150;
      maxSparklesPerClick = 1;
      setStarLevel('calm');
      createMobileButtons();
      initJoystick((key) => {
        keyDown(key, canvas.width, canvas.height, (x, y) => {
          if (sparkleMode) {
            for (let i = 0; i < 8; i++) spawnSparkle(x, y, randColor);
            playSparkle();
          } else {
            spawnRipple(x, y, randColor);
            playPlink();
          }
        });
        setTimeout(() => keyUp(key), 50);
      });
    }
  }

  document.getElementById('btnDesktop').onclick = () => dismissPicker('desktop');
  document.getElementById('btnMobile').onclick  = () => dismissPicker('mobile');

  // ── init mobile UI ─────────────────────────────────────
  initMobileUI({
    showToast,
    toggleBreathing,
    toggleSpinner,
    isSpinnerOn,
    setSparkleMode,
    getSparkleMode,
    showSensoryPicker,
    showColourPicker,
  });
  
    // ── Loop ───────────────────────────────────────────────
    let lastFrame = 0;
  const MOBILE_FPS = 30;

  function loop(timestamp) {
    if (deviceMode === 'mobile') {
      if (timestamp - lastFrame < 1000 / MOBILE_FPS) {
        requestAnimationFrame(loop);
        return;
      }
      lastFrame = timestamp;
    }
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    updateStars(); drawStars(ctx);
    updateRipples(); drawRipples(ctx);
    updateSparkles(); drawSparkles(ctx);
    updateLetterBubbles(); drawLetterBubbles(ctx);
    drawBreathing(ctx, canvas, showToast);
    drawSpinner(ctx, canvas);
    if (deviceMode !== 'mobile' || isTurtleOn()) updateTurtle();
    if (deviceMode !== 'mobile' || isTurtleOn()) drawTurtle(ctx);
    drawJoystick(ctx, isTurtleOn());
    drawHintBar();
    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);

</script>
</body>
</html>
